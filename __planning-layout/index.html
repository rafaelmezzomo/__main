<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Semanal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }

  /* Week switcher */
  .week-switcher {
    display: flex;
    align-items: center;
    gap: 0;
    background: #010409;
    border-bottom: 1px solid #30363d;
    padding: 0 24px;
    height: 36px;
  }
  .week-tab {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    color: #8b949e;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .week-tab:hover { color: #c9d1d9; }
  .week-tab.active {
    color: #f0f6fc;
    border-bottom-color: #f78166;
  }
  .week-tab .tab-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 600;
  }
  .week-tab .tab-badge.current { background: #1f6feb; color: #fff; }
  .week-tab .tab-badge.past { background: #21262d; color: #8b949e; }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: auto;
  }
  .week-nav-btn {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    font-size: 14px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .week-nav-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .week-nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Header */
  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
  }
  .header .meta {
    font-size: 13px;
    color: #8b949e;
  }
  .header .meta strong { color: #c9d1d9; }

  /* Retro banner */
  .retro-banner {
    display: none;
    background: linear-gradient(135deg, #161b22 0%, #1c2333 100%);
    border-bottom: 1px solid #30363d;
    padding: 12px 24px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .retro-banner:hover { background: #1c2333; }
  .retro-banner.visible { display: block; }
  .retro-banner-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .retro-banner-title {
    font-weight: 600;
    color: #f0f6fc;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .retro-banner-stats {
    display: flex;
    gap: 16px;
    color: #8b949e;
    font-size: 12px;
  }
  .retro-banner-stats .green { color: #3fb950; }
  .retro-banner-stats .yellow { color: #d29922; }
  .retro-banner-chevron {
    color: #8b949e;
    font-size: 16px;
    transition: transform 0.2s;
  }
  .retro-banner-chevron.expanded { transform: rotate(180deg); }
  .retro-body {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #21262d;
    line-height: 1.6;
    color: #8b949e;
    font-size: 12px;
    max-height: 300px;
    overflow-y: auto;
  }
  .retro-body.expanded { display: block; }
  .retro-body h4 { color: #c9d1d9; margin: 8px 0 4px; font-size: 12px; }
  .retro-body h4:first-child { margin-top: 0; }
  .retro-body ul { padding-left: 16px; }
  .retro-body li { margin-bottom: 2px; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    padding: 12px 24px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    font-size: 13px;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .stat-dot.todo { background: #8b949e; }
  .stat-dot.doing { background: #d29922; }
  .stat-dot.done { background: #3fb950; }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: #21262d;
    display: flex;
  }
  .progress-done { background: #3fb950; transition: width 0.3s; }
  .progress-doing { background: #d29922; transition: width 0.3s; }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    height: calc(100vh - 150px);
  }

  .column {
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .column:last-child { border-right: none; }

  .column-header {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid #30363d;
    background: #161b22;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
  }
  .column-header .count {
    background: #30363d;
    color: #8b949e;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .column-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  /* Cards */
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 6px;
    cursor: grab;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .card:hover { border-color: #58a6ff; }
  .card.dragging {
    opacity: 0.5;
    border-color: #58a6ff;
    box-shadow: 0 0 0 1px #58a6ff;
  }
  .card-priority {
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 6px 0 0 6px;
  }
  .card-priority.red { background: #f85149; }
  .card-priority.yellow { background: #d29922; }
  .card-priority.green { background: #3fb950; }
  .card-priority.white { background: #8b949e; }

  .card-id {
    font-size: 11px;
    color: #8b949e;
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: #f0f6fc;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
  }
  .card-project {
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    font-size: 11px;
  }
  .card-project.yangplanet { background: #1f3a1f; color: #56d364; }
  .card-project.memory-club { background: #3d2e00; color: #e3b341; }
  .card-project.stalolabs { background: #1c2d4f; color: #79c0ff; }

  .card-hours {
    color: #8b949e;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .card-repo {
    font-size: 10px;
    color: #6e7681;
    margin-top: 4px;
  }

  /* Drop zone */
  .column-body.drag-over { background: rgba(56, 139, 253, 0.04); }

  .priority-icon { margin-right: 4px; }

  /* Filter bar */
  .filters {
    display: flex;
    gap: 6px;
    padding: 8px 24px;
    background: #0d1117;
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .filter-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  /* Changelog panel */
  .changelog-btn {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .changelog-btn:hover { border-color: #58a6ff; color: #c9d1d9; }

  .changelog-panel {
    display: none;
    position: fixed;
    top: 0; right: 0;
    width: 480px; height: 100vh;
    background: #161b22;
    border-left: 1px solid #30363d;
    z-index: 90;
    flex-direction: column;
    box-shadow: -8px 0 24px rgba(0,0,0,0.3);
  }
  .changelog-panel.open { display: flex; }

  .changelog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #30363d;
  }
  .changelog-header h3 { font-size: 14px; font-weight: 600; color: #f0f6fc; }

  .changelog-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 14px;
    line-height: 1.7;
  }
  .changelog-body h2 { font-size: 15px; font-weight: 600; color: #f0f6fc; margin-top: 24px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #21262d; }
  .changelog-body h2:first-child { margin-top: 0; }
  .changelog-body h3 { font-size: 13px; font-weight: 600; color: #c9d1d9; margin-top: 12px; margin-bottom: 4px; }
  .changelog-body ul { padding-left: 18px; margin-bottom: 8px; }
  .changelog-body li { color: #8b949e; font-size: 13px; margin-bottom: 3px; }
  .changelog-body h1 { font-size: 16px; color: #f0f6fc; margin-bottom: 16px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding-top: 80px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #30363d;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .modal-close {
    background: none;
    border: none;
    color: #8b949e;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .modal-close:hover { background: #30363d; color: #f0f6fc; }

  .modal-body { padding: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8b949e;
    margin-bottom: 4px;
  }
  .modal-value { font-size: 14px; color: #c9d1d9; line-height: 1.5; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .modal-status-btns { display: flex; gap: 6px; margin-top: 4px; }
  .modal-status-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-status-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .modal-status-btn.active-todo { background: #21262d; border-color: #8b949e; color: #c9d1d9; }
  .modal-status-btn.active-doing { background: #2d2000; border-color: #d29922; color: #d29922; }
  .modal-status-btn.active-done { background: #0d2818; border-color: #3fb950; color: #3fb950; }

  .modal-notes {
    width: 100%;
    min-height: 80px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-family: inherit;
    font-size: 13px;
    padding: 10px;
    resize: vertical;
    margin-top: 4px;
  }
  .modal-notes:focus { outline: none; border-color: #58a6ff; }
  .modal-notes::placeholder { color: #484f58; }

  .priority-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .priority-badge.red { background: #3d1a1a; color: #f85149; }
  .priority-badge.yellow { background: #3d2e00; color: #d29922; }
  .priority-badge.green { background: #0d2818; color: #3fb950; }
  .priority-badge.white { background: #21262d; color: #8b949e; }
</style>
</head>

<div class="week-switcher" id="week-switcher"></div>

<div class="header">

<div class="retro-banner" id="retro-banner">

<div class="stats" id="stats-bar"></div>

<div class="filters" id="filters"></div>

<div class="changelog-panel" id="changelog-panel">

  </div>
  <div class="changelog-body" id="changelog-body">Carregando...</div>
</div>

<div class="changelog-panel" id="retros-panel">
  <div class="changelog-header">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="week-nav-btn" id="retros-prev">&#9664;</button>
      <button class="week-nav-btn" id="retros-next">&#9654;</button>
      <h3 id="retros-title">Retrospectiva</h3>
    </div>
    <button class="modal-close" id="retros-close">&times;</button>
  </div>
  <div class="changelog-body" id="retros-body">Carregando...</div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

const WEEK_ORDER = Object.keys(WEEKS).sort();
let currentWeekKey = WEEK_ORDER[WEEK_ORDER.length - 1]; // default to latest

const PRIORITY_EMOJI = { red: '🔴', yellow: '🟡', green: '🟢', white: '⚪' };
const PRIORITY_LABELS = { red: 'Fazer Agora', yellow: 'Agendar', green: 'Quick Win', white: 'Backlog' };

// ── Sync mode ──
// Servido por scripts/serve.js (http) → status sincroniza com planning.json no disco.
// Aberto via file:// → fallback localStorage (offline, Claude não enxerga).
const SERVER = location.protocol.startsWith('http');

// ── LocalStorage ──
function lsKey(week, type) { return `planning-${type}-${week}`; }

function loadStatuses(week) {
  try { return JSON.parse(localStorage.getItem(lsKey(week, 'status'))) || {}; } catch { return {}; }
}
function saveStatuses(week, statuses) {
  localStorage.setItem(lsKey(week, 'status'), JSON.stringify(statuses));
}

// Lê os status do planning.json no disco (modo server). Retorna {} se falhar.
async function fetchDiskStatuses(week) {
  try {
    const res = await fetch(`/api/planning/${week}`);
    if (!res.ok) return {};
    const json = await res.json();
    const map = {};
    for (const proj of Object.values(json.projects || {})) {
      for (const t of proj.tasks || []) {
        if (t.status && t.status !== 'todo') map[t.id] = t.status;
      }
    }
    return map;
  } catch { return {}; }
}

// Grava um status no disco (modo server). Fire-and-forget com toast no erro.
function pushDiskStatus(week, taskId, status) {
  fetch('/api/status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ week, taskId, status }),
  }).then(r => { if (!r.ok) showSyncToast('Falha ao salvar no disco'); })
    .catch(() => showSyncToast('Servidor offline — status não salvo'));
}

function showSyncToast(msg) {
  let el = document.getElementById('sync-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-toast';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#3d1d1d;border:1px solid #f85149;color:#ffa198;padding:8px 14px;border-radius:6px;font-size:13px;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}
function loadNotes(week) {
  try { return JSON.parse(localStorage.getItem(lsKey(week, 'notes'))) || {}; } catch { return {}; }
}
function saveNotes(week, notes) {
  localStorage.setItem(lsKey(week, 'notes'), JSON.stringify(notes));
}

let statuses = {};
let allNotes = {};
let activeFilter = 'all';

function getStatus(taskId) {
  if (statuses[taskId]) return statuses[taskId];
  // Check default_status from data
  const data = WEEKS[currentWeekKey];
  for (const proj of Object.values(data.projects)) {
    for (const t of proj.tasks) {
      if (t.id === taskId && t.default_status) return t.default_status;
    }
  }
  return 'todo';
}

function setStatus(taskId, status) {
  statuses[taskId] = status;
  saveStatuses(currentWeekKey, statuses);
  if (SERVER) pushDiskStatus(currentWeekKey, taskId, status);
}

function getAllTasks() {
  const data = WEEKS[currentWeekKey];
  const tasks = [];
  for (const [projectId, project] of Object.entries(data.projects)) {
    for (const task of project.tasks) {
      tasks.push({ ...task, projectId, projectName: project.name });
    }
  }
  return tasks;
}

// ── Week switcher ──
function renderWeekSwitcher() {
  const el = document.getElementById('week-switcher');
  el.innerHTML = '';

  for (const wk of WEEK_ORDER) {
    const data = WEEKS[wk];
    const isCurrent = wk === currentWeekKey;
    const isLatest = wk === WEEK_ORDER[WEEK_ORDER.length - 1];

    const tab = document.createElement('div');
    tab.className = `week-tab ${isCurrent ? 'active' : ''}`;

    const startParts = data.start_date.split('-');
    const endParts = data.end_date.split('-');
    const dateLabel = `${startParts[2]}/${startParts[1]} - ${endParts[2]}/${endParts[1]}`;

    let badge = '';
    if (isLatest) {
      badge = '<span class="tab-badge current">atual</span>';
    } else if (data.retro && data.retro.completed) {
      badge = '<span class="tab-badge past">✓</span>';
    }

    tab.innerHTML = `${wk} <span style="color:#6e7681;font-size:11px">${dateLabel}</span> ${badge}`;
    tab.addEventListener('click', () => switchWeek(wk));
    el.appendChild(tab);
  }

  // Nav buttons
  const nav = document.createElement('div');
  nav.className = 'week-nav';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'week-nav-btn';
  prevBtn.innerHTML = '&#9664;';
  prevBtn.disabled = currentWeekKey === WEEK_ORDER[0];
  prevBtn.addEventListener('click', () => {
    const idx = WEEK_ORDER.indexOf(currentWeekKey);
    if (idx > 0) switchWeek(WEEK_ORDER[idx - 1]);
  });

  const nextBtn = document.createElement('button');
  nextBtn.className = 'week-nav-btn';
  nextBtn.innerHTML = '&#9654;';
  nextBtn.disabled = currentWeekKey === WEEK_ORDER[WEEK_ORDER.length - 1];
  nextBtn.addEventListener('click', () => {
    const idx = WEEK_ORDER.indexOf(currentWeekKey);
    if (idx < WEEK_ORDER.length - 1) switchWeek(WEEK_ORDER[idx + 1]);
  });

  nav.appendChild(prevBtn);
  nav.appendChild(nextBtn);
  el.appendChild(nav);
}

function switchWeek(weekKey) {
  currentWeekKey = weekKey;
  statuses = loadStatuses(weekKey);
  allNotes = loadNotes(weekKey);
  activeFilter = 'all';
  renderWeekSwitcher();
  renderHeader();
  renderRetro();
  renderFilters();
  render();
  if (typeof isRetroPanelOpen === 'function' && isRetroPanelOpen()) {
    retroIdx = WEEK_ORDER.indexOf(currentWeekKey);
    renderRetroPanel();
  }
  // Modo server: o disco é a fonte de verdade — sobrepõe o status do localStorage.
  if (SERVER) {
    fetchDiskStatuses(weekKey).then(disk => {
      if (weekKey !== currentWeekKey) return;
      statuses = { ...statuses, ...disk };
      saveStatuses(weekKey, statuses);
      render();
    });
  }
}

// ── Cards ──
function createCard(task) {
  const card = document.createElement('div');
  card.className = 'card';
  card.draggable = true;
  card.dataset.taskId = task.id;
  card.dataset.project = task.projectId;

  card.innerHTML = `
    <div class="card-priority ${task.priority}"></div>
    <div class="card-id">${PRIORITY_EMOJI[task.priority]} ${task.id}</div>
    <div class="card-title">${task.title}</div>
    <div class="card-footer">
      <span class="card-project ${task.projectId}">${task.projectName}</span>
      <span class="card-hours">${task.estimated_hours}h</span>
    </div>
    <div class="card-repo">${task.repo}</div>
  `;

  card.addEventListener('dragstart', e => {
    card.classList.add('dragging');
    e.dataTransfer.setData('text/plain', task.id);
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('click', e => {
    if (e.defaultPrevented) return;
    openModal(task);
  });

  return card;
}

document.getElementById('modal-close').addEventListener('click', closeModal);

document.addEventListener('keydown', e => {

    closeModal();
    document.getElementById('retros-panel').classList.remove('open');
    document.getElementById('changelog-panel').classList.remove('open');
  }
});

// ── Render board ──
function render() {
  const tasks = getAllTasks();
  const cols = { todo: [], doing: [], done: [] };

  for (const task of tasks) {
    const status = getStatus(task.id);
    if (activeFilter !== 'all' && task.projectId !== activeFilter) continue;
    cols[status].push(task);
  }

  const priorityOrder = { red: 0, yellow: 1, green: 2, white: 3 };
  for (const col of Object.values(cols)) {
    col.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
  }

  for (const [status, statusTasks] of Object.entries(cols)) {
    const colEl = document.getElementById(`col-${status}`);
    colEl.innerHTML = '';
    for (const task of statusTasks) colEl.appendChild(createCard(task));
    document.getElementById(`count-${status}`).textContent = statusTasks.length;
  }

  updateStats(tasks);
}

function updateStats(allTasks) {
  const filtered = activeFilter === 'all' ? allTasks : allTasks.filter(t => t.projectId === activeFilter);
  const total = filtered.length;
  const doing = filtered.filter(t => getStatus(t.id) === 'doing').length;
  const done = filtered.filter(t => getStatus(t.id) === 'done').length;
  const todo = total - doing - done;

  const hoursDone = filtered.filter(t => getStatus(t.id) === 'done').reduce((s, t) => s + t.estimated_hours, 0);
  const hoursDoing = filtered.filter(t => getStatus(t.id) === 'doing').reduce((s, t) => s + t.estimated_hours, 0);
  const hoursTotal = filtered.reduce((s, t) => s + t.estimated_hours, 0);

  document.getElementById('hours-used').textContent = `${hoursDone + hoursDoing}h`;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><div class="stat-dot todo"></div> ${todo} todo</div>
    <div class="stat-item"><div class="stat-dot doing"></div> ${doing} doing</div>
    <div class="stat-item"><div class="stat-dot done"></div> ${done} done</div>
    <div class="stat-item" style="margin-left:auto;color:#8b949e">${hoursDone}h done / ${hoursTotal}h total</div>
  `;

  const pctDone = total > 0 ? (done / total) * 100 : 0;
  const pctDoing = total > 0 ? (doing / total) * 100 : 0;
  document.getElementById('progress-done').style.width = pctDone + '%';
  document.getElementById('progress-doing').style.width = pctDoing + '%';
}

// ── Filters ──
function renderFilters() {
  const data = WEEKS[currentWeekKey];
  const filtersEl = document.getElementById('filters');
  filtersEl.innerHTML = '';
  const projects = [{ id: 'all', name: 'Todos' }, ...Object.entries(data.projects).map(([id, p]) => ({ id, name: p.name }))];

  for (const proj of projects) {
    const btn = document.createElement('button');
    btn.className = `filter-btn ${activeFilter === proj.id ? 'active' : ''}`;
    btn.textContent = proj.name;
    btn.addEventListener('click', () => {
      activeFilter = proj.id;
      renderFilters();
      render();
    });
    filtersEl.appendChild(btn);
  }
}

// ── Drag & drop ──
document.querySelectorAll('.column-body').forEach(col => {
  col.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
  col.addEventListener('drop', e => {
    e.preventDefault();
    col.classList.remove('drag-over');
    const taskId = e.dataTransfer.getData('text/plain');
    const newStatus = col.parentElement.dataset.status;
    setStatus(taskId, newStatus);
    render();
  });
});

function loadChangelog() {

function parseMarkdown(md) {
  return md
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, m => '<ul>' + m + '</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code style="background:#21262d;padding:2px 5px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/\n{2,}/g, '<br>');
}
